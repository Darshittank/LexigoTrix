<body>

<header>
  <h1>✦ LexigoTrix ✦</h1>
  <p>Drag horizontally, vertically or diagonally to trace hidden words</p>

<div class="card">
  <div class="score-row">

    <span id="foundCount">0 / ?</span>

    <button id="btnNew"    aria-label="Generate a new puzzle with new words">New Puzzle</button>
  </div>

  <div id="status" role="status" aria-live="polite">Drag across the grid to trace a spell</div>

  <p class="legend-title">Spells hidden in this grid</p>
  <div id="spellLegend" aria-label="List of hidden words"></div>
